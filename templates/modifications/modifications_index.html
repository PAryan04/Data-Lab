<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Lab - Modifications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <!-- Using components.css for hero-card layout -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <style>
        .note-text {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 0.5rem;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="page-wrapper">

    <!-- Header -->
    <header class="site-header">
        <div class="site-title">Data Lab</div>
        <div class="site-tagline"><b><i>Turning Data into Decisions</i></b></div>
    </header>

    <!-- Main content -->
    <main class="site-main">
        <section class="hero-card"> 
            
            <!-- Back button -->
            <div style="text-align: left; margin-bottom: 0.5rem; width: 100%;">
                <a href="{{ url_for('upload_success') }}" class="back-btn">
                    <button>← Back</button>
                </a>
            </div>

            <h1 style="font-size: 2.2rem; font-weight: 800; font-style: italic; margin-bottom: 0.5rem; text-align: center; color: #333;">
                Modify your data and use it for future!
            </h1>
            
            <p class="note-text" style="text-align: center;">
                (Note: Variables created here are accessible only until your session exists)
            </p>

            <!-- Buttons Grid -->
            <div class="menu-grid">
                <!-- 3.1.1 Sorting -->
                <a href="{{ url_for('sorting') }}" class="grid-btn">
                    Sorting
                </a>
                
                <!-- 3.1.2 Filtering -->
                <a href="{{ url_for('filtering') }}" class="grid-btn">
                    Filtering
                </a>
                
                <!-- 3.1.3 Change Indices -->
                <a href="{{ url_for('change_indices') }}" class="grid-btn">
                    Change Indices
                </a>
                
                <!-- 3.1.4 Segmentation -->
                <a href="{{ url_for('segmentation') }}" class="grid-btn">
                    Segmentation (.groupby())
                </a>
            </div>

        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-small"><i>created by</i></div>
            <div class="footer-author"><b><i>~Aryan Patel</i></b></div>
        </div>
    </footer>

</div>
</body>
</html>
